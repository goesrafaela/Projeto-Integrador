<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>Crie sua conta</h2>
        <p class="login-subtitle">Preencha os dados para se cadastrar</p>

       <form id="formCadastro">
          <div class="input-group">
            <label for="nome">Nome completo</label>
            <input type="text" id="nome" required />
          </div>

          <div class="input-group">
            <label for="email">Email</label>
            <input type="email" id="email" required />
          </div>

          <div class="input-group">
            <label for="telefone">Telefone</label>
            <input type="tel" id="telefone" maxlength="11" placeholder="(00) 00000-0000" required />
          </div>

          <div class="input-group">
            <label for="senha">Senha</label>
            <input type="password" id="senha" required />
          </div>

          <div class="input-group">
            <label for="confirmarSenha">Confirmar senha</label>
            <input type="password" id="confirmarSenha" required />
          </div>

          <button type="submit" class="btn-login">Cadastrar</button>
        </form>

        <div class="login-footer">
          Já tem conta? <a href="login.html">Entrar</a>
        </div>
        <a href="index.html" class="link-voltar">← Voltar para o início</a>
      </div>
    </div>
    <script src="js/cadastro.js"></script>
  </body>
</html>
