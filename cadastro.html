<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Cadastro</title>
    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="login-container">
      <div class="login-box">
        <h2>Crie sua conta</h2>
        <p class="login-subtitle">Preencha os dados para se cadastrar</p>

        <form>
          <div class="input-group">
            <label>Nome completo</label>
            <input type="text" />
          </div>

          <div class="input-group">
            <label>Email</label>
            <input type="email" />
          </div>

          <div class="input-group">
            <label>Senha</label>
            <input type="password" />
          </div>

          <div class="input-group">
            <label>Confirmar senha</label>
            <input type="password" />
          </div>

          <button class="btn-login">Cadastrar</button>
        </form>

        <div class="login-footer">
          Já tem conta? <a href="login.html">Entrar</a>
        </div>
        <a href="index.html" class="link-voltar">← Voltar para o início</a>
      </div>
    </div>
  </body>
</html>
